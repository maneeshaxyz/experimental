name: Welcome Outside Contributors

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write

jobs:
  welcome:
    if: >-
      ${{
        !github.event.issue.pull_request &&
        github.event.comment.user.type != 'Bot' &&
        contains(
          fromJson('["NONE","FIRST_TIMER","FIRST_TIME_CONTRIBUTOR","CONTRIBUTOR"]'),
          github.event.comment.author_association
        )
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Welcome first-time outside commenters on issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WELCOME_BOT_PAT || github.token }}
          script: |
            const issueNumber = context.payload.issue.number;
            const login = context.payload.comment.user.login;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranch = context.payload.repository.default_branch;
            const repoUrl = `https://github.com/${owner}/${repo}`;
            const marker = `<!-- outside-contributor-welcome:${login.toLowerCase()} -->`;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              },
            );

            const alreadyWelcomed = comments.some((comment) =>
              typeof comment.body === "string" && comment.body.includes(marker),
            );

            if (alreadyWelcomed) {
              core.info(`Skipping duplicate welcome for ${login} on issue #${issueNumber}.`);
              return;
            }

            const body = [
              `Hi @${login}, thanks for joining the conversation.`,
              ``,
              `Useful links:`,
              `- [Contributing guide](${repoUrl}/blob/${defaultBranch}/CONTRIBUTING.md)`,
              `- [Code of conduct](${repoUrl}/blob/${defaultBranch}/CODE_OF_CONDUCT.md)`,
              `- [Help](${repoUrl}/blob/${defaultBranch}/SUPPORT.md)`,
              ``,
              `Glad to have you here.`,
              marker,
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body,
            });
